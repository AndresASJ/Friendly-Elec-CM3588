# FlareSolverr — Cloudflare-challenge bypass for indexers
#
# Add it to Prowlarr as a proxy. Indexer-level "flaresolverr" tag routes
# only protected indexers through it.

name: flaresolverr
services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: America/New_York
    ports:
      - "8191:8191/tcp"
    restart: unless-stopped
