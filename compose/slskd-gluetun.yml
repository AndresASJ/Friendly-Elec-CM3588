# slskd (Soulseek) + Gluetun (ProtonVPN WireGuard)
#
# Same kill-switch pattern as qBittorrent. slskd peer port 50300 is fixed
# (Soulseek doesn't use NAT-PMP), so port forwarding is OFF — peers reach
# you via outbound connections.
#
# Uses ProtonVPN *provider* mode (auto-selects a live US server) — NOT a custom
# wg0.conf pinned to one server. (2026-06-03: the old custom config was pinned to a
# dead server (146.70.202.18) and had been down ~8 weeks; switched to provider mode.)
#
# Before deploying, put your ProtonVPN WireGuard key + address in a git-ignored env file
# at /mnt/drive1/AppData/gluetun-slskd/proton.env:
#   WIREGUARD_PRIVATE_KEY=<from the Proton WireGuard config>
#   WIREGUARD_ADDRESSES=10.2.0.2/32

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-slskd
    cap_add:
      - NET_ADMIN
    environment:
      - TZ=America/New_York
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - SERVER_COUNTRIES=United States
    env_file:
      - /mnt/drive1/AppData/gluetun-slskd/proton.env
    ports:
      - "5032:5032/tcp"     # slskd web UI (LAN-accessible via gluetun)
      - "50300:50300/tcp"   # Soulseek peer port
    volumes:
      - /mnt/drive1/AppData/gluetun-slskd:/gluetun
    restart: unless-stopped

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    user: "1000:1000"   # download as uid 1000 so Soularr/Lidarr can import (was root)
    depends_on:
      - gluetun
    network_mode: service:gluetun
    environment:
      - TZ=America/New_York
      - SLSKD_REMOTE_CONFIGURATION=true
      # Web UI runs on 5032 (set in slskd.yml). The slskd image's baked healthcheck
      # probes http://localhost:${SLSKD_HTTP_PORT}/health, defaulting to 5030, so the
      # container reported "unhealthy" forever despite slskd being fine. Pin to 5032.
      - SLSKD_HTTP_PORT=5032
    volumes:
      - /mnt/drive1/AppData/slskd:/app
      - /mnt/drive1/Downloads/Soulseek:/downloads
      # incomplete/partial downloads kept OUTSIDE the synced Soulseek folder
      # (a Mac syncs /downloads to Google Drive; don't upload partials).
      # Pair with slskd.yml: directories.incomplete: /incomplete
      - /mnt/drive1/AppData/slskd-incomplete:/incomplete
    restart: unless-stopped
