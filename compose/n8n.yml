services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=CHANGE_ME_PG_PASSWORD   # generate: openssl rand -hex 24
      - POSTGRES_DB=n8n
    volumes:
      - /mnt/drive1/AppData/n8n-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_default

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_HOST=CHANGE_ME_N8N_SUBDOMAIN          # e.g. n8n.yourdomain.com
      - WEBHOOK_URL=CHANGE_ME_N8N_WEBHOOK_URL     # e.g. https://n8n.yourdomain.com/
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=CHANGE_ME_TIMEZONE       # e.g. America/New_York
      - N8N_ENCRYPTION_KEY=CHANGE_ME_ENCRYPTION_KEY  # copy from /mnt/drive1/AppData/n8n/config
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=CHANGE_ME_PG_PASSWORD  # must match postgres service above
    volumes:
      - /mnt/drive1/AppData/n8n:/home/node/.n8n
    user: "1000:1000"
    networks:
      - n8n_default

networks:
  n8n_default:
    name: n8n_default
