# qBittorrent + Gluetun (ProtonVPN WireGuard)
#
# qBittorrent is forced through Gluetun via network_mode: service:gluetun.
# If Gluetun stops, qBit has NO network. Hard kill-switch.
#
# Uses gluetun's NATIVE ProtonVPN provider (NOT a pinned custom wg0.conf).
# Why: a single pinned server is a silent single point of failure — when Proton
# retires that server the tunnel dies quietly (no failover) and downloads+seeding
# stop until you notice. Provider mode lets gluetun auto-rotate among healthy
# Proton servers using just your account's WireGuard private key (the key works
# across all Proton servers). See docs/06-downloads-vpn.md.
#
# Before deploying:
#   1. In your Proton account → WireGuard config: enable NAT-PMP (Port Forwarding),
#      pick a P2P server, create. Copy the [Interface] PrivateKey + Address.
#   2. Put the PrivateKey in WIREGUARD_PRIVATE_KEY and Address in WIREGUARD_ADDRESSES.
#   3. Do NOT leave a wg0.conf in /gluetun/wireguard/ — in provider mode its Endpoint
#      line makes gluetun error: "server selection: endpoint port is set".
#   4. Place qbit-port-forward.sh at /mnt/drive1/AppData/gluetun-qbit/
#   5. Adjust FIREWALL_OUTBOUND_SUBNETS to your LAN subnet

name: qbittorrent
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-qbit
    cap_add:
      - NET_ADMIN
    environment:
      TZ: America/New_York
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: CHANGE_ME          # [Interface] PrivateKey from a Proton WG config
      WIREGUARD_ADDRESSES: 10.2.0.2/32          # [Interface] Address (IPv4) from that config
      SERVER_COUNTRIES: United States           # gluetun auto-rotates among matching healthy servers
      PORT_FORWARD_ONLY: "on"                   # only select port-forwarding-capable servers
      VPN_PORT_FORWARDING: "on"
      VPN_PORT_FORWARDING_PROVIDER: protonvpn
      VPN_PORT_FORWARDING_UP_COMMAND: '/bin/sh -c "/gluetun/qbit-port-forward.sh up {{PORT}} {{VPN_INTERFACE}}"'
      VPN_PORT_FORWARDING_DOWN_COMMAND: '/bin/sh -c "/gluetun/qbit-port-forward.sh down 0 lo"'
      FIREWALL_INPUT_PORTS: "8090"
      FIREWALL_OUTBOUND_SUBNETS: "192.168.50.0/24"   # CHANGE_ME — your LAN subnet
    ports:
      - "8090:8090/tcp"   # qBittorrent Web UI (published by gluetun, not qbit)
    volumes:
      - /mnt/drive1/AppData/gluetun-qbit:/gluetun
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: service:gluetun   # critical — share Gluetun's network namespace
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/New_York
      WEBUI_PORT: "8090"
    volumes:
      - /mnt/drive1/AppData/qbittorrent:/config
      - /mnt/drive1/torrents:/mnt/drive1/torrents
      - /mnt/drive1:/mnt/drive1    # so hardlinks work with Sonarr/Radarr
    restart: unless-stopped
